  /* -------------------- Date helpers -------------------- */
  const pad = n => String(n).padStart(2, '0');
  const ymd = d => `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
  const todayYMD = () => ymd(new Date());
  const parseYMD = s => { const [y,m,d] = s.split('-').map(Number); return new Date(y, m-1, d); };
  const sameMonth = (a, b) => a.getFullYear() === b.getFullYear() && a.getMonth() === b.getMonth();
  const startOfWeek = d => { // ISO Monday
    const c = new Date(d); const day = (c.getDay()+6)%7;
    c.setHours(0,0,0,0); c.setDate(c.getDate() - day); return c;
  };
  const endOfWeek = d => { const s = startOfWeek(d); const e = new Date(s); e.setDate(s.getDate()+6); e.setHours(23,59,59,999); return e; };
  const startOfMonth = d => new Date(d.getFullYear(), d.getMonth(), 1);
  const endOfMonth = d => new Date(d.getFullYear(), d.getMonth()+1, 0, 23,59,59,999);

  function calcHours(start, end) {
    const [sh, sm] = start.split(':').map(Number);
    const [eh, em] = end.split(':').map(Number);
    const mins = (eh*60+em) - (sh*60+sm);
    return Math.max(0, mins/60);
  }
  function round1(n) { return Math.round(n*10)/10; }

  function formatDateLocale(s, lang) {
    const d = parseYMD(s);
    const map = { en: 'en-US', vi: 'vi-VN', zh: 'zh-CN' };
    return d.toLocaleDateString(map[lang] || 'en-US', { weekday:'short', year:'numeric', month:'short', day:'numeric' });
  }

    try {

  }
  function save(key, val) {
    try { localStorage.setItem(key, JSON.stringify(val)); } catch {}

  /* -------------------- Seed tickets (deterministic, based on today) -------------------- */
  function generateSeedTickets() {
    // Generate tickets for the previous 14 days inside the CURRENT month only,
    // so demo always has fresh data without violating "in current month" rule.
    const today = new Date();
    today.setHours(0,0,0,0);
    const monthStart = startOfMonth(today);
    const tickets = [];
    let id = 1;

    const teamWorkers = (teamId) => SEED_USERS.filter(u => u.teamId === teamId && u.role === ROLES.WORKER).map(u => u.id);
    const leaderOf = (teamId) => SEED_USERS.find(u => u.teamId === teamId && u.role === ROLES.LEADER);

    // For each past day in this month up to yesterday, possibly add tickets.
    for (let d = new Date(monthStart); d <= today; d.setDate(d.getDate()+1)) {
      // Skip today to keep "today" empty for the demo to add new tickets
      if (d.getTime() === today.getTime()) continue;
      const dateStr = ymd(d);
      // Pseudo-random based on day number
      const dayNum = d.getDate();
      [1, 2].forEach(teamId => {
        const seed = (dayNum * 31 + teamId * 17) % 100;
        if (seed < 70) { // most weekdays have OT
          const leader = leaderOf(teamId);
          const workers = teamWorkers(teamId);
          // pick some subset
          const cnt = 2 + (seed % 3); // 2..4 workers
          const chosen = [];
          for (let i=0; i<cnt; i++) chosen.push(workers[(seed+i) % workers.length]);
          const startHour = 17 + ((seed % 2));
          const endHour   = startHour + 2 + (seed % 3);
          const start = `${pad(startHour)}:30`;
          const end   = `${pad(Math.min(endHour, 22))}:00`;
          tickets.push({
            id: `t-${id++}`,
            date: dateStr,
            startTime: start,
            endTime: end,
            workerIds: Array.from(new Set(chosen)),
            createdBy: leader.id,
            teamId,
            reason: '',
            status: STATUS.PUBLISHED,
            createdAt: new Date(d.getFullYear(), d.getMonth(), d.getDate(), 9, 0).toISOString(),
          });
        }
      });
    }
    return tickets;
  }

    if (!load(STORAGE_KEYS.TICKETS, null)) save(STORAGE_KEYS.TICKETS, generateSeedTickets());
  }

      if (!LANGS.includes(l)) return;
      setLangState(l);
      save(STORAGE_KEYS.LANG, l);
    };
    const t = useCallback((k) => (TR[lang] && TR[lang][k]) || TR.en[k] || k, [lang]);
    return <I18nCtx.Provider value={{ lang, setLang, t }}>{children}</I18nCtx.Provider>;
  }
  const useT = () => useContext(I18nCtx);

  /* -------------------- Auth -------------------- */
  const AuthCtx = createContext(null);
  function AuthProvider({ children }) {
    const [user, setUser] = useState(() => load(STORAGE_KEYS.CURRENT, null));
    const login = (username, password) => {
      const users = load(STORAGE_KEYS.USERS, SEED_USERS);
      const u = users.find(x => x.username.toLowerCase() === username.toLowerCase().trim() && x.password === password);
      if (!u) return false;
      const safe = { ...u }; delete safe.password;
      setUser(safe); save(STORAGE_KEYS.CURRENT, safe);
      return true;
    };
    const logout = () => { setUser(null); localStorage.removeItem(STORAGE_KEYS.CURRENT); };
    return <AuthCtx.Provider value={{ user, login, logout }}>{children}</AuthCtx.Provider>;
  }
  const useAuth = () => useContext(AuthCtx);

  /* -------------------- Tickets store hook -------------------- */
  function useTickets() {
    const [tickets, setTickets] = useState(() => load(STORAGE_KEYS.TICKETS, []));
    useEffect(() => { save(STORAGE_KEYS.TICKETS, tickets); }, [tickets]);
    const add = (t) => setTickets(prev => [t, ...prev]);
    const update = (id, patch) => setTickets(prev => prev.map(t => t.id === id ? { ...t, ...patch } : t));
    const remove = (id) => setTickets(prev => prev.filter(t => t.id !== id));
    return { tickets, setTickets, add, update, remove };
  }

  function FilterBar({ filter, setFilter, includeDay=true }) {

          {tabs.map(tab => (
            <button key={tab.id} onClick={()=>setFilter(f => ({ ...f, mode: tab.id, day: tab.id==='day' ? todayYMD() : f.day }))}
              className={`px-3 py-1.5 text-sm rounded-md font-medium transition ${filter.mode===tab.id ? 'bg-white shadow text-brand-700' : 'text-slate-600 hover:text-slate-800'}`}>
              {tab.label}
            </button>
          ))}
        </div>
        {filter.mode === 'day' && (
          <input type="date" value={filter.day}
            onChange={e=>setFilter(f => ({ ...f, day: e.target.value }))}
            className="px-2 py-1.5 text-sm rounded-lg border border-slate-200" />
        )}
      </div>
    );
  }

  function filterRange(filter) {
    const now = new Date();
    if (filter.mode === 'day') {
      const d = parseYMD(filter.day || todayYMD());
      const e = new Date(d); e.setHours(23,59,59,999);
      return [d, e];
    }
    if (filter.mode === 'week') return [startOfWeek(now), endOfWeek(now)];
    return [startOfMonth(now), endOfMonth(now)];
  }

  function inRange(ticketDateStr, [start, end]) {
    const d = parseYMD(ticketDateStr);
    const e = new Date(d); e.setHours(23,59,59,999);
    return d >= start && e <= end ? true : (d >= start && d <= end);
  }

  function rangeLabel(filter, t, lang) {
    const [s, e] = filterRange(filter);
    const map = { en: 'en-US', vi: 'vi-VN', zh: 'zh-CN' };
    if (filter.mode === 'day') return new Date(s).toLocaleDateString(map[lang]||'en-US', { weekday:'long', year:'numeric', month:'long', day:'numeric' });
    return `${s.toLocaleDateString(map[lang]||'en-US')} — ${e.toLocaleDateString(map[lang]||'en-US')}`;
  }

  /* -------------------- Stats helpers -------------------- */
  function computeStats(tickets, users) {
    const published = tickets.filter(t => t.status === STATUS.PUBLISHED);
    let totalHours = 0;
    const perPerson = new Map(); // userId -> { hours, count }
    for (const t of published) {
      const h = calcHours(t.startTime, t.endTime);
      for (const w of t.workerIds) {
        totalHours += h;
        const cur = perPerson.get(w) || { hours: 0, count: 0 };
        cur.hours += h; cur.count += 1;
        perPerson.set(w, cur);
      }
    }
    const uniqueWorkers = perPerson.size;
    const avgPerWorker = uniqueWorkers ? totalHours / uniqueWorkers : 0;
    const list = Array.from(perPerson.entries()).map(([uid, s]) => {
      const u = users.find(x => x.id === uid);
      return { user: u, hours: s.hours, count: s.count, avg: s.count? s.hours/s.count : 0 };
    }).sort((a,b) => b.hours - a.hours);
    return { totalHours, uniqueWorkers, avgPerWorker, perPerson: list, ticketCount: published.length };
  }

  function CreateTicketModal({ onClose, onCreate, leader, allUsers }) {
    const { t } = useT();
    const teamWorkers = allUsers.filter(u => u.teamId === leader.teamId && u.role === ROLES.WORKER);
    const [date, setDate] = useState(todayYMD());
    const [startTime, setStart] = useState('17:30');
    const [endTime, setEnd] = useState('20:00');
    const [reason, setReason] = useState('');
    const [selected, setSelected] = useState(new Set(teamWorkers.map(u => u.id)));
    const [includeSelf, setIncludeSelf] = useState(false);
    const [err, setErr] = useState('');

    const toggle = (id) => {
      setSelected(prev => {
        const n = new Set(prev);
        if (n.has(id)) n.delete(id); else n.add(id);
        return n;
      });
    };

    const submit = (e) => {
      e.preventDefault();
      const now = new Date();
      const d = parseYMD(date);
      const todayD = parseYMD(todayYMD());
      // date must be today or later, within current month
      if (d < todayD) { setErr(t('errDate')); return; }
      if (!sameMonth(d, now)) { setErr(t('errMonth')); return; }
      if (calcHours(startTime, endTime) <= 0) { setErr(t('errTime')); return; }
      // if date is today, ensure end time is in the future
      if (d.getTime() === todayD.getTime()) {
        const [eh, em] = endTime.split(':').map(Number);
        const endDT = new Date(); endDT.setHours(eh, em, 0, 0);
        if (endDT <= now) { setErr(t('errPastTime')); return; }
      }
      let workers = Array.from(selected);
      if (includeSelf && !workers.includes(leader.id)) workers.push(leader.id);
      if (workers.length === 0) { setErr(t('errNoWorkers')); return; }
      const ticket = {
        id: `t-${Date.now()}`,
        date, startTime, endTime,
        workerIds: workers,
        createdBy: leader.id,
        teamId: leader.teamId,
        reason: reason.trim(),
        status: STATUS.DRAFT,
        createdAt: new Date().toISOString(),
      };
      onCreate(ticket);
    };

    // Compute month limits for date input
    const now = new Date();

              <div>
                <label className="block text-xs font-semibold text-slate-600 mb-1">{t('date')}</label>
                <input type="date" value={date} min={minDate} max={maxDate} onChange={e=>setDate(e.target.value)}
                  className="w-full px-3 py-2 rounded-lg border border-slate-200" required />
              </div>
              <div>
                <label className="block text-xs font-semibold text-slate-600 mb-1">{t('startTime')}</label>
                <input type="time" value={startTime} onChange={e=>setStart(e.target.value)}
                  className="w-full px-3 py-2 rounded-lg border border-slate-200" required />
              </div>
              <div>

              </div>
            </div>

          <div className="text-xs text-slate-500 mt-2 flex items-center gap-1.5">
            <svg className="w-3.5 h-3.5 text-slate-400" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
            <span>{t('by')}: <span className="font-semibold text-slate-700">{creator.name}</span> · <span className="text-slate-500">{getTeamLabel(creator.teamId, t)}</span></span>
          </div>
        )}
        {ticket.reason && <div className="text-xs text-slate-600 mt-2 italic">"{ticket.reason}"</div>}
        <div className="mt-3 flex flex-wrap gap-1.5">
          {ticket.workerIds.slice(0,4).map(id => {
            const u = users.find(x => x.id === id);
            return u ? <span key={id} className="text-xs px-2 py-0.5 rounded-md bg-slate-100 text-slate-700">{u.name}</span> : null;
          })}
          {ticket.workerIds.length > 4 && <span className="text-xs text-slate-500 px-1">+{ticket.workerIds.length - 4}</span>}
        </div>
        {canEdit && (
          <div className="mt-3 pt-3 border-t border-slate-100 flex justify-end gap-2" onClick={e=>e.stopPropagation()}>
            {ticket.status === STATUS.DRAFT && <Button variant="success" onClick={onApprove}>{t('approve')}</Button>}
            <Button variant="danger" onClick={onDelete}>{t('delete')}</Button>
          </div>
        )}
      </div>
    );
  }

  /* -------------------- Leader Dashboard -------------------- */
  function LeaderDashboard() {
    const { t, lang } = useT();
    const { user } = useAuth();
    const { tickets, add, update, remove } = useTickets();
    const users = load(STORAGE_KEYS.USERS, SEED_USERS);

    const [filter, setFilter] = useState({ mode: 'month', day: todayYMD() });
    const [showCreate, setShowCreate] = useState(false);
    const [detail, setDetail] = useState(null);

    const myTickets = useMemo(() => tickets.filter(tk => tk.createdBy === user.id), [tickets, user]);
    const range = filterRange(filter);
    const filtered = useMemo(() => myTickets.filter(tk => inRange(tk.date, range)).sort((a,b) => b.date.localeCompare(a.date) || b.startTime.localeCompare(a.startTime)),
      [myTickets, filter]);
    const stats = useMemo(() => computeStats(filtered, users), [filtered]);

    const onCreate = (tk) => { add(tk); setShowCreate(false); };
    const onApprove = (id) => update(id, { status: STATUS.PUBLISHED });
    const onDelete = (id) => { if (confirm(t('confirmDelete'))) remove(id); };

    return (
      <div className="max-w-7xl mx-auto px-4 sm:px-6 py-6 space-y-6">
        <div className="flex items-center justify-between flex-wrap gap-3">
          <div>
            <h1 className="text-2xl font-bold text-slate-800">{t('myTickets')}</h1>
            <p className="text-sm text-slate-500">{getTeamLabel(user.teamId, t)}</p>
          </div>
          <Button onClick={()=>setShowCreate(true)}>{t('newTicket')}</Button>
        </div>

        <Card className="p-4">
          <FilterBar filter={filter} setFilter={setFilter} />
          <div className="text-xs text-slate-500 mt-2">{t('summaryFor')}: <span className="font-semibold text-slate-700">{rangeLabel(filter, t, lang)}</span></div>
        </Card>

        <div className="grid grid-cols-2 lg:grid-cols-4 gap-4">
          <StatTile label={t('totalHours')} value={`${round1(stats.totalHours)} ${t('hoursShort')}`} accent="brand" />
          <StatTile label={t('uniqueWorkers')} value={stats.uniqueWorkers} accent="green" />
          <StatTile label={t('avgPerWorker')} value={`${round1(stats.avgPerWorker)} ${t('hoursShort')}`} accent="amber" />
          <StatTile label={t('totalSessions')} value={stats.ticketCount} accent="brand" />
        </div>

        {filtered.length > 0 ? (
          <div className="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-4">
            {filtered.map(tk => (
              <TicketCard key={tk.id} ticket={tk} users={users}
                onApprove={()=>onApprove(tk.id)} onDelete={()=>onDelete(tk.id)}
                onOpen={()=>setDetail(tk)} canEdit={true} />
            ))}
          </div>
        ) : (
          <Card className="p-8 text-center">
            <div className="text-slate-500">{t('noTickets')}</div>
            <div className="text-xs text-slate-400 mt-1">{t('noTicketsCreate')}</div>
          </Card>
        )}

        {showCreate && <CreateTicketModal onClose={()=>setShowCreate(false)} onCreate={onCreate} leader={user} allUsers={users} />}
        {detail && <TicketDetail ticket={detail} onClose={()=>setDetail(null)} users={users} />}
      </div>
    );
  }

  /* -------------------- Worker Dashboard -------------------- */
  function WorkerDashboard() {
    const { t, lang } = useT();
    const { user } = useAuth();
    const { tickets } = useTickets();
    const users = load(STORAGE_KEYS.USERS, SEED_USERS);
    const [detail, setDetail] = useState(null);

    const myTickets = useMemo(() =>
      tickets.filter(tk => tk.status === STATUS.PUBLISHED && tk.workerIds.includes(user.id)),
      [tickets, user]
    );

    const now = new Date();
    const monthStart = startOfMonth(now);
    const monthEnd = endOfMonth(now);
    const myMonth = myTickets.filter(tk => {
      const d = parseYMD(tk.date);
      return d >= monthStart && d <= monthEnd;
    });
    const totalHours = myMonth.reduce((s, tk) => s + calcHours(tk.startTime, tk.endTime), 0);
    const totalSessions = myMonth.length;
    const avg = totalSessions ? totalHours / totalSessions : 0;

    // Build per-day list for this month up to today
    const days = [];
    for (let d = new Date(monthStart); d <= now; d.setDate(d.getDate()+1)) {
      const ds = ymd(d);
      const dayTickets = myMonth.filter(tk => tk.date === ds);
      const hours = dayTickets.reduce((s, tk) => s + calcHours(tk.startTime, tk.endTime), 0);
      days.push({ date: ds, dateObj: new Date(d), tickets: dayTickets, hours });
    }
    days.reverse();

    return (
      <div className="max-w-5xl mx-auto px-4 sm:px-6 py-6 space-y-6">
        <div>
          <h1 className="text-2xl font-bold text-slate-800">{t('hello')}, {user.name}</h1>
          <p className="text-sm text-slate-500">{getTeamLabel(user.teamId, t)}</p>
        </div>

        <div className="grid grid-cols-3 gap-4">
          <StatTile label={t('totalHours')} value={`${round1(totalHours)} ${t('hoursShort')}`} accent="brand" />
          <StatTile label={t('totalSessions')} value={totalSessions} accent="green" />
          <StatTile label={t('avgPerSession')} value={`${round1(avg)} ${t('hoursShort')}`} accent="amber" />
        </div>

        <Card className="p-0 overflow-hidden">
          <div className="px-5 py-3 border-b border-slate-100 flex items-center justify-between">
            <h2 className="font-semibold text-slate-800">{t('dailyOvertime')}</h2>
            <div className="text-xs text-slate-500">{rangeLabel({mode:'month'}, t, lang)}</div>
          </div>
          <div className="divide-y divide-slate-100">
            {days.map(d => (
              <div key={d.date} className="px-5 py-3 flex items-center gap-4">
                <div className="w-32">
                  <div className="text-sm font-semibold text-slate-800">{formatDateLocale(d.date, lang)}</div>
                </div>
                <div className="flex-1">
                  {d.tickets.length > 0 ? (
                    <div className="flex flex-wrap gap-2">
                      {d.tickets.map(tk => (
                        <button key={tk.id} onClick={()=>setDetail(tk)} className="text-xs px-2 py-1 rounded-md bg-emerald-50 text-emerald-700 hover:bg-emerald-100 transition">
                          {tk.startTime}–{tk.endTime} · {round1(calcHours(tk.startTime, tk.endTime))}{t('hoursShort')}
                        </button>
                      ))}
                    </div>
                  ) : (
                    <span className="text-xs text-slate-400">{t('notRecorded')}</span>
                  )}
                </div>
                <div className="w-24 text-right">
                  {d.hours > 0
                    ? <span className="text-sm font-semibold text-emerald-700">{round1(d.hours)} {t('hoursShort')}</span>
                    : <span className="text-xs text-slate-300">—</span>}
                </div>
              </div>
            ))}
          </div>
        </Card>

        {detail && <TicketDetail ticket={detail} onClose={()=>setDetail(null)} users={users} />}
      </div>
    );
  }

  /* -------------------- Manager Dashboard -------------------- */
  function ManagerDashboard() {
    const { t, lang } = useT();
    const { tickets } = useTickets();
    const users = load(STORAGE_KEYS.USERS, SEED_USERS);
    const [filter, setFilter] = useState({ mode: 'month', day: todayYMD() });
    const [teamFilter, setTeamFilter] = useState('all'); // 'all' | 1 | 2
    const [detail, setDetail] = useState(null);

    const range = filterRange(filter);
    const filtered = useMemo(() => tickets.filter(tk =>
      tk.status === STATUS.PUBLISHED
      && inRange(tk.date, range)
      && (teamFilter === 'all' || tk.teamId === teamFilter)
    ), [tickets, filter, teamFilter]);
    const stats = useMemo(() => computeStats(filtered, users), [filtered]);

    // Per-team summary (independent of selected team filter, always shown)
    const perTeam = useMemo(() => {
      const inPeriod = tickets.filter(tk => tk.status === STATUS.PUBLISHED && inRange(tk.date, range));
      return [1, 2].map(tid => {
        const teamTickets = inPeriod.filter(tk => tk.teamId === tid);
        const s = computeStats(teamTickets, users);
        return { teamId: tid, ...s };
      });
    }, [tickets, filter]);

    const teamTabs = [
      { id: 'all', label: t('allTeams') },
      { id: 1,     label: t('teamName1') },
      { id: 2,     label: t('teamName2') },
    ];

    return (
      <div className="max-w-7xl mx-auto px-4 sm:px-6 py-6 space-y-6">
        <div>
          <h1 className="text-2xl font-bold text-slate-800">{t('companyOverview')}</h1>
          <p className="text-sm text-slate-500">{t('mgmt')}</p>
        </div>

        <Card className="p-4 space-y-3">
          <FilterBar filter={filter} setFilter={setFilter} />
          <div className="flex items-center gap-2 flex-wrap">
            <span className="text-xs uppercase font-semibold text-slate-500">{t('filterTeam')}:</span>
            <div className="inline-flex bg-slate-100 rounded-lg p-1">
              {teamTabs.map(tab => (
                <button key={tab.id} onClick={()=>setTeamFilter(tab.id)}
                  className={`px-3 py-1.5 text-sm rounded-md font-medium transition ${teamFilter===tab.id ? 'bg-white shadow text-brand-700' : 'text-slate-600 hover:text-slate-800'}`}>
                  {tab.label}
                </button>
              ))}
            </div>
          </div>
          <div className="text-xs text-slate-500">{t('summaryFor')}: <span className="font-semibold text-slate-700">{rangeLabel(filter, t, lang)}</span></div>
        </Card>

        <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
          {perTeam.map(team => {
            const isActive = teamFilter === team.teamId || teamFilter === 'all';
            return (
              <button key={team.teamId} onClick={()=>setTeamFilter(team.teamId)}
                className={`text-left p-5 rounded-2xl border bg-white shadow-sm transition ${
                  teamFilter === team.teamId ? 'border-brand-400 ring-2 ring-brand-100' : 'border-slate-100 hover:border-slate-300'
                } ${isActive ? '' : 'opacity-60'}`}>
                <div className="flex items-center justify-between">
                  <div className="text-sm font-semibold text-slate-800">{getTeamLabel(team.teamId, t)}</div>
                  <span className="text-xs px-2 py-0.5 rounded-full bg-brand-50 text-brand-700 font-semibold">{team.ticketCount} {t('tickets').toLowerCase()}</span>
                </div>
                <div className="mt-3 grid grid-cols-3 gap-3 text-xs">
                  <div>
                    <div className="text-slate-500">{t('totalHours')}</div>
                    <div className="font-bold text-lg text-slate-800">{round1(team.totalHours)}<span className="text-xs font-medium text-slate-500"> {t('hoursShort')}</span></div>
                  </div>
                  <div>
                    <div className="text-slate-500">{t('uniqueWorkers')}</div>
                    <div className="font-bold text-lg text-slate-800">{team.uniqueWorkers}</div>
                  </div>
                  <div>
                    <div className="text-slate-500">{t('avgPerWorker')}</div>
                    <div className="font-bold text-lg text-slate-800">{round1(team.avgPerWorker)}<span className="text-xs font-medium text-slate-500"> {t('hoursShort')}</span></div>
                  </div>
                </div>
              </button>
            );
          })}
        </div>

        <div className="grid grid-cols-2 lg:grid-cols-4 gap-4">
          <StatTile label={t('totalHours')} value={`${round1(stats.totalHours)} ${t('hoursShort')}`} accent="brand" />
          <StatTile label={t('uniqueWorkers')} value={stats.uniqueWorkers} accent="green" />
          <StatTile label={t('avgPerWorker')} value={`${round1(stats.avgPerWorker)} ${t('hoursShort')}`} accent="amber" />
          <StatTile label={t('totalSessions')} value={stats.ticketCount} accent="brand" />
        </div>

        <Card className="p-0 overflow-hidden">
          <div className="px-5 py-3 border-b border-slate-100 flex items-center justify-between">
            <h2 className="font-semibold text-slate-800">{t('perPerson')}</h2>
          </div>
          {stats.perPerson.length === 0 ? (
            <div className="px-5 py-10 text-center text-sm text-slate-500">{t('noData')}</div>
          ) : (
            <div className="overflow-x-auto">
              <table className="w-full text-sm">
                <thead className="bg-slate-50 text-xs uppercase text-slate-500">
                  <tr>
                    <th className="px-5 py-2 text-left font-semibold">{t('name')}</th>
                    <th className="px-5 py-2 text-left font-semibold">{t('role')}</th>
                    <th className="px-5 py-2 text-left font-semibold">{t('team')}</th>
                    <th className="px-5 py-2 text-right font-semibold">{t('times')}</th>
                    <th className="px-5 py-2 text-right font-semibold">{t('totalHours')}</th>
                    <th className="px-5 py-2 text-right font-semibold">{t('averageH')}</th>
                  </tr>
                </thead>
                <tbody className="divide-y divide-slate-100">
                  {stats.perPerson.map(row => row.user && (
                    <tr key={row.user.id} className="hover:bg-slate-50">
                      <td className="px-5 py-2.5 font-medium text-slate-800">{row.user.name}</td>
                      <td className="px-5 py-2.5"><RoleBadge role={row.user.role} t={t} /></td>
                      <td className="px-5 py-2.5 text-slate-600">{getTeamLabel(row.user.teamId, t)}</td>
                      <td className="px-5 py-2.5 text-right">{row.count}</td>
                      <td className="px-5 py-2.5 text-right font-semibold text-brand-700">{round1(row.hours)}</td>
                      <td className="px-5 py-2.5 text-right">{round1(row.avg)}</td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
          )}
        </Card>

        <Card className="p-0 overflow-hidden">
          <div className="px-5 py-3 border-b border-slate-100">
            <h2 className="font-semibold text-slate-800">{t('allTickets')} — {filtered.length}</h2>
          </div>
          {filtered.length === 0 ? (
            <div className="px-5 py-10 text-center text-sm text-slate-500">{t('noData')}</div>
          ) : (
            <div className="p-4 grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-4">
              {filtered.sort((a,b) => b.date.localeCompare(a.date)).map(tk => (
                <TicketCard key={tk.id} ticket={tk} users={users} onOpen={()=>setDetail(tk)} canEdit={false} showCreator={true} />
              ))}
            </div>
          )}
        </Card>

        {detail && <TicketDetail ticket={detail} onClose={()=>setDetail(null)} users={users} />}
      </div>
    );
  }

  /* -------------------- App Root -------------------- */
  function AppRoot() {
    const { user } = useAuth();
    if (!user) return <><LoginPage /><LanguageSwitcher /><CreditChip /></>;
    return (
      <div className="min-h-screen flex flex-col">
        <Header />
        <main className="flex-1 pb-24">
          {user.role === ROLES.MANAGER && <ManagerDashboard />}
          {user.role === ROLES.LEADER && <LeaderDashboard />}
          {user.role === ROLES.WORKER && <WorkerDashboard />}
        </main>
        <LanguageSwitcher />
        <CreditChip />
      </div>
    );
  }

  function App() {
    return (
      <I18nProvider>
        <AuthProvider>
          <AppRoot />
        </AuthProvider>
      </I18nProvider>
    );
  }

  const root = ReactDOM.createRoot(document.getElementById('root'));
  root.render(<App />);
  </script>
</body>
</html>
